repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: "Ruff linter"
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python]
      - id: ruff-format
        name: "Ruff formatter"
        types_or: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        args: [--config-file=pyproject.toml, memograph/]
        language: system
        types: [python]
        pass_filenames: false
