name: Release Plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Create release archive
        run: |
          mkdir -p release
          cp main.js manifest.json release/
          if [ -f styles.css ]; then cp styles.css release/; fi
          cd release && zip -r ../memograph-sync-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## MemoGraph Sync ${{ steps.get_version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/obsidian-plugin/CHANGELOG.md) for details.

            ### Installation
            1. Download `memograph-sync-${{ steps.get_version.outputs.VERSION }}.zip`
            2. Extract to your Obsidian plugins folder: `.obsidian/plugins/memograph-sync/`
            3. Reload Obsidian
            4. Enable the plugin in Settings > Community Plugins

            ### What's Included
            - `main.js` - Plugin code
            - `manifest.json` - Plugin manifest
            - `styles.css` - Plugin styles (if present)
          draft: false
          prerelease: false

      - name: Upload Release Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./memograph-sync-${{ steps.get_version.outputs.VERSION }}.zip
          asset_name: memograph-sync-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload main.js
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./main.js
          asset_name: main.js
          asset_content_type: application/javascript

      - name: Upload manifest.json
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./manifest.json
          asset_name: manifest.json
          asset_content_type: application/json

      - name: Update versions.json
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          MIN_OBSIDIAN=$(jq -r '.minAppVersion' manifest.json)
          jq --arg version "$VERSION" --arg min "$MIN_OBSIDIAN" '.[$version] = $min' versions.json > versions.json.tmp
          mv versions.json.tmp versions.json

      - name: Commit updated versions.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add versions.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update versions.json for ${{ steps.get_version.outputs.VERSION }}"
          git push origin HEAD:main
