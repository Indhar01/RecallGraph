startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - vault
    properties:
      vault:
        type: string
        title: "Vault Path"
        description: "Absolute path to your MemoGraph vault directory"
        default: "~/my-vault"
      provider:
        type: string
        title: "LLM Provider"
        description: "LLM provider for AI-generated answers (optional)"
        enum: ["ollama", "claude"]
      model:
        type: string
        title: "LLM Model"
        description: "Model name override (optional)"
  commandFunction: |
    (config) => ({
      command: "python",
      args: [
        "-m", "memograph.mcp.run_server",
        "--vault", config.vault || "~/my-vault",
        ...(config.provider ? ["--provider", config.provider] : []),
        ...(config.model ? ["--model", config.model] : [])
      ],
      env: {
        MEMOGRAPH_VAULT: config.vault || "~/my-vault",
        ...(config.provider ? { MEMOGRAPH_PROVIDER: config.provider } : {}),
        ...(config.model ? { MEMOGRAPH_MODEL: config.model } : {})
      }
    })
