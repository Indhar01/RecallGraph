name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]"

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

      - name: Run mypy
        run: mypy memograph/ --config-file=pyproject.toml
        continue-on-error: true

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Run tests
        run: |
          pytest --cov=memograph --cov-report=xml --cov-report=term --cov-report=html

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  test-enhanced:
    name: Test Enhanced Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Run enhanced module tests
        run: |
          pytest tests/test_cache_enhanced.py tests/test_validation.py tests/test_graph_enhanced.py tests/test_kernel_enhanced.py -v --cov=memograph.core --cov=memograph.storage --cov-report=term

      - name: Check enhanced module coverage
        run: |
          pytest tests/test_cache_enhanced.py tests/test_validation.py tests/test_graph_enhanced.py tests/test_kernel_enhanced.py --cov=memograph.storage.cache_enhanced --cov=memograph.core.validation --cov=memograph.core.graph_enhanced --cov=memograph.core.kernel_enhanced --cov-report=term
        continue-on-error: true

  performance:
    name: Performance Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Run performance tests
        run: |
          pytest tests/test_cache_enhanced.py::TestCachePerformance -v
          pytest tests/test_graph_enhanced.py::TestPerformance -v
          pytest tests/test_kernel_enhanced.py::TestPerformanceImprovements -v

      - name: Performance benchmark
        run: |
          python -c "
          from memograph.core.kernel_enhanced import EnhancedMemoryKernel
          import time
          import tempfile
          import os

          # Create temp vault
          with tempfile.TemporaryDirectory() as tmpdir:
              vault = os.path.join(tmpdir, 'vault')
              os.makedirs(vault)

              # Create test file
              test_file = os.path.join(vault, 'test.md')
              with open(test_file, 'w') as f:
                  f.write('---\ntitle: Test\ntags: [test]\n---\nContent')

              # Benchmark
              kernel = EnhancedMemoryKernel(vault_path=vault)

              start = time.time()
              kernel.ingest()
              ingest_time = time.time() - start

              start = time.time()
              results = kernel.retrieve_nodes('test')
              query_time = time.time() - start

              print(f'Ingest time: {ingest_time:.3f}s')
              print(f'Query time: {query_time:.3f}s')

              # Fail if too slow
              assert ingest_time < 5.0, f'Ingest too slow: {ingest_time:.3f}s'
              assert query_time < 1.0, f'Query too slow: {query_time:.3f}s'

              print('✓ Performance benchmarks passed')
          "

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Test backward compatibility
        run: |
          pytest tests/test_kernel_enhanced.py::TestBackwardCompatibility -v

      - name: Test cache integration
        run: |
          pytest tests/test_kernel_enhanced.py::TestCacheManagement -v

      - name: Test validation integration
        run: |
          pytest tests/test_kernel_enhanced.py::TestRememberWithValidation -v
          pytest tests/test_kernel_enhanced.py::TestRetrieveWithCaching -v

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pip install -e ".[dev]"

      - name: Run pre-commit hooks
        run: pre-commit run --all-files
        continue-on-error: true

  quality-gates:
    name: Code Quality Gates
    runs-on: ubuntu-latest
    needs: [lint, test, test-enhanced, performance, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Run all tests with coverage
        run: |
          pytest --cov=memograph --cov-report=xml --cov-report=term

      - name: Quality summary
        run: |
          echo "## Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Linting passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Enhanced modules tested" >> $GITHUB_STEP_SUMMARY
          echo "✅ Performance benchmarks passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Integration tests passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true
