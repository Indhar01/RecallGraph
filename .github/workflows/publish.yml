name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: This is required for Trusted Publishing (OIDC)
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
          # This creates the dist/ folder
        run: python -m build

      - name: Publish to PyPI
        # This replaces twine and uses the Trusted Publisher connection
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No token or password needed!
          skip-existing: true
