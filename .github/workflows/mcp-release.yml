name: MCP Release Automation

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'server.json'
      - 'smithery.yaml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0)'
        required: false

jobs:
  sync-and-validate:
    name: Sync Version & Validate MCP Config
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      needs_update: ${{ steps.check_version.outputs.needs_update }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml tomli

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 PyProject Version: $VERSION"

      - name: Check if server.json needs update
        id: check_version
        run: |
          PYPROJECT_VERSION="${{ steps.get_version.outputs.version }}"
          SERVER_VERSION=$(python -c "import json; print(json.load(open('server.json'))['version'])")

          echo "PyProject Version: $PYPROJECT_VERSION"
          echo "Server.json Version: $SERVER_VERSION"

          if [ "$PYPROJECT_VERSION" != "$SERVER_VERSION" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "⚠️ Version mismatch detected!"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ Versions are in sync"
          fi

      - name: Update server.json version
        if: steps.check_version.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          python -c "
          import json
          with open('server.json', 'r') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          if 'packages' in data and len(data['packages']) > 0:
              data['packages'][0]['version'] = '$VERSION'
          with open('server.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f'✅ Updated server.json to version {VERSION}')
          "

      - name: Validate server.json
        run: |
          python scripts/verify_mcp_registry.py

      - name: Commit version sync
        if: steps.check_version.outputs.needs_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add server.json
          git commit -m "chore: sync server.json version to ${{ steps.get_version.outputs.version }}"
          git push

  publish-smithery:
    name: Publish to Smithery Marketplace
    needs: sync-and-validate
    runs-on: windows-latest
    # Environment: https://smithery.ai/server/memograph
    if: github.event_name == 'release' || github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if mcp-publisher.exe exists
        id: check_publisher
        run: |
          if (Test-Path "mcp-publisher.exe") {
            echo "exists=true" >> $env:GITHUB_OUTPUT
            echo "✅ mcp-publisher.exe found"
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
            echo "⚠️ mcp-publisher.exe not found"
          }

      - name: Publish to Smithery
        if: steps.check_publisher.outputs.exists == 'true'
        run: |
          # Attempt to publish using mcp-publisher
          # This assumes the tool accepts arguments like: mcp-publisher.exe publish
          # Adjust based on actual tool usage
          ./mcp-publisher.exe --help || echo "Tool usage documentation needed"

          # If the tool supports publishing:
          # ./mcp-publisher.exe publish --config smithery.yaml --version ${{ needs.sync-and-validate.outputs.version }}
        continue-on-error: true

  create-mcp-reminder:
    name: Create MCP Registry Reminder
    needs: [sync-and-validate, publish-smithery]
    runs-on: ubuntu-latest
    # Environment: https://modelcontextprotocol.io/registry
    if: github.event_name == 'release' || github.event_name == 'push'

    steps:
      - name: Create Issue for Manual MCP Submission
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.sync-and-validate.outputs.version }}';
            const issueTitle = `📋 MCP Registry Submission Required for v${version}`;
            const issueBody = `
            ## MCP Registry Submission Checklist

            A new version **v${version}** has been released. Please complete the MCP registry submission:

            ### Steps:

            1. ✅ **PyPI Publication** - Automated (should be complete)
               - Check: https://pypi.org/project/memograph/

            2. ✅ **server.json Version** - Automated (synced to ${version})

            3. ⏳ **MCP Registry Submission** - Manual Required
               - Visit: https://modelcontextprotocol.io/registry
               - Click "Publish a Server" or "Submit Server"
               - Authenticate with GitHub (@Indhar01)
               - Submit namespace: \`io.github.Indhar01/memograph\`

            4. ⏳ **Smithery Marketplace** (Optional)
               - Check if automated publish succeeded
               - If not, manually publish at Smithery

            ### Verification:

            Run verification script:
            \`\`\`bash
            python scripts/verify_mcp_registry.py
            \`\`\`

            ### Documentation:
            - [MCP Registry Guide](https://github.com/Indhar01/MemoGraph/blob/main/docs/MCP_REGISTRY_GUIDE.md)
            - [README](https://github.com/Indhar01/MemoGraph/blob/main/README.md)

            ---

            Close this issue once MCP registry submission is complete.
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'mcp-release'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes(version)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['mcp-release', 'automation', 'release']
              });
              console.log('✅ Created MCP submission reminder issue');
            } else {
              console.log('ℹ️ Issue already exists for this version');
            }

  summary:
    name: Release Summary
    needs: [sync-and-validate, publish-smithery, create-mcp-reminder]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# 🚀 MCP Release Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Version: ${{ needs.sync-and-validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Automated Tasks:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version sync (server.json)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Configuration validation" >> $GITHUB_STEP_SUMMARY
          echo "- ⏳ Smithery publish (attempted)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ MCP reminder issue created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manual Action Required:" >> $GITHUB_STEP_SUMMARY
          echo "📋 Check the 'mcp-release' issue for MCP registry submission instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [PyPI Package](https://pypi.org/project/memograph/)" >> $GITHUB_STEP_SUMMARY
          echo "- [MCP Registry](https://modelcontextprotocol.io/registry)" >> $GITHUB_STEP_SUMMARY
          echo "- [Issues](https://github.com/${{ github.repository }}/issues?q=is%3Aissue+is%3Aopen+label%3Amcp-release)" >> $GITHUB_STEP_SUMMARY

